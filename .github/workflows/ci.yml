name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - audit/ui-backup-delete-button

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      ADMIN_PASSWORD: ci-admin-password
      USER_PASSWORD: ci-user-password
      DATABASE_URL: sqlite+aiosqlite:///./data/zhkh-ci.db
      UPLOAD_DIR: ./data/uploads
      LOG_DIR: ./logs
      GENERATION_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_ADMIN_ID: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare runtime directories
        run: |
          mkdir -p data/uploads logs backups

      - name: Syntax check
        run: |
          python -m compileall app tests

      - name: Import web app
        run: |
          python -c "from app.web.main import app; assert app.title == 'ZhKH Bot'; print('app import ok')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v
