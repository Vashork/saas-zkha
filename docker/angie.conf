events {
    worker_connections 1024;
}

http {
    upstream web {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # Let the application validate normal receipt/backup upload limits and
        # show localized UI errors. Extremely large requests still get a friendly page.
        client_max_body_size 100m;
        error_page 413 /request-too-large;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location = /request-too-large {
            internal;
            default_type text/plain;
            return 413 'File too large';
        }

        # Receipts must not be public. They are served only through authenticated
        # /payments/receipts/... route in the web application.
        location /uploads/ {
            return 404;
        }

        location /angie-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
