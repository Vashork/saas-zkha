events {
    worker_connections 1024;
}

http {
    upstream web {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # Let the application validate normal receipt/backup upload limits and
        # show localized UI errors. Extremely large requests still get a friendly page.
        client_max_body_size 100m;
        error_page 413 /request-too-large;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location = /request-too-large {
            internal;
            default_type text/html;
            return 413 '<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>Файл слишком большой</title><style>body{font-family:Arial,sans-serif;background:#1a1d24;color:#e8e6e3;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.card{background:#252830;border-radius:16px;padding:28px;max-width:520px}a{color:#93c5fd}</style></head><body><div class="card"><h1>Файл слишком большой</h1><p>Файл превышает допустимый размер. Вернитесь назад и выберите файл меньшего размера.</p><p><a href="javascript:history.back()">Вернуться назад</a></p></div></body></html>';
        }

        # Receipts must not be public. They are served only through authenticated
        # /payments/receipts/... route in the web application.
        location /uploads/ {
            return 404;
        }

        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
