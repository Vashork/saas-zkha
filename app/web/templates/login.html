<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🏠 Мой Дом — Вход</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">🏠 Мой Дом</div>
        <h2>Учет платежей ЖКХ</h2>
        <p class="login-subtitle">Войдите в систему</p>

        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" class="input-custom" placeholder="Логин" required autofocus>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" class="input-custom" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn-custom btn-full">Войти</button>
        </form>
    </div>
</div>
</body>
</html>
