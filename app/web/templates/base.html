<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{% block title %}🏠 Мой Дом{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/modal.css">
<script>
// Load theme before page render to avoid flash
(function() {
    var theme = localStorage.getItem('theme') || '{{ user_theme | default("dark") }}';
    document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</head>
<body>
{% block content %}{% endblock %}
<script src="/static/js/main.js"></script>
<script>
(function() {
    var role = '{{ user_role | default("") }}';
    if (role !== 'admin') return;
    var nav = document.querySelector('.nav-links');
    if (!nav) return;
    var hasBackups = Array.from(nav.querySelectorAll('a,button')).some(function(item) {
        return (item.getAttribute('href') === '/backups') || (item.getAttribute('onclick') || '').indexOf('/backups') !== -1;
    });
    if (hasBackups) return;
    var analyticsItem = Array.from(nav.querySelectorAll('a,button')).find(function(item) {
        return (item.getAttribute('href') === '/analytics') || (item.getAttribute('onclick') || '').indexOf('/analytics') !== -1;
    });
    var backupButton = document.createElement('button');
    backupButton.className = 'nav-link-custom';
    backupButton.type = 'button';
    backupButton.textContent = '💾 Бекапы';
    backupButton.onclick = function() { location.href = '/backups'; };
    if (analyticsItem && analyticsItem.nextSibling) {
        nav.insertBefore(backupButton, analyticsItem.nextSibling);
    } else {
        nav.appendChild(backupButton);
    }
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
