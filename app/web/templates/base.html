<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{% block title %}🏠 Мой Дом{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/form-controls.css">
<link rel="stylesheet" href="/static/css/modal.css">
<link rel="stylesheet" href="/static/css/qa-fixes.css">
<script>
// Load theme before page render to avoid flash
(function() {
    var theme = localStorage.getItem('theme') || '{{ user_theme | default("dark") }}';
    document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</head>
<body>
{% block content %}{% endblock %}
<script src="/static/js/main.js"></script>
<script>
(function() {
    var role = '{{ user_role | default("") }}';
    if (role !== 'admin') return;
    var nav = document.querySelector('.nav-links');
    if (!nav) return;
    var items = Array.from(nav.querySelectorAll('a,button'));
    var historyItem = items.find(function(item) {
        return (item.getAttribute('href') === '/history') || (item.getAttribute('onclick') || '').indexOf('/history') !== -1;
    });
    var backupItem = items.find(function(item) {
        return (item.getAttribute('href') === '/backups') || (item.getAttribute('onclick') || '').indexOf('/backups') !== -1;
    });
    if (!backupItem) {
        backupItem = document.createElement('button');
        backupItem.className = 'nav-link-custom';
        backupItem.type = 'button';
        backupItem.textContent = '💾 Бекапы';
        backupItem.onclick = function() { location.href = '/backups'; };
    }
    if (historyItem && historyItem.nextSibling !== backupItem) {
        nav.insertBefore(backupItem, historyItem.nextSibling);
    } else if (!historyItem && !backupItem.parentNode) {
        nav.appendChild(backupItem);
    }
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
