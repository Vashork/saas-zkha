version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: zhkh-web
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/zhkh-bot
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/zhkh.db
      - UPLOAD_DIR=/app/data/uploads
      - LOG_DIR=/var/log/zhkh-bot
    env_file:
      - .env
    networks:
      - zhkh-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: zhkh-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/zhkh-bot
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/zhkh.db
      - UPLOAD_DIR=/app/data/uploads
      - LOG_DIR=/var/log/zhkh-bot
    env_file:
      - .env
    networks:
      - zhkh-bot-network
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: zhkh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./app/web/static:/app/app/web/static:ro
      - ./data/uploads:/app/data/uploads:ro
    networks:
      - zhkh-bot-network
    depends_on:
      - web

networks:
  zhkh-bot-network:
    driver: bridge
