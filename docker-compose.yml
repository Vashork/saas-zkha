services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: zhkh-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/var/log/zhkh-bot
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/zhkh.db
      - UPLOAD_DIR=/app/data/uploads
      - LOG_DIR=/var/log/zhkh-bot
    env_file: [.env]
    networks:
      - zhkh-bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: zhkh-bot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/zhkh-bot
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/zhkh.db
      - UPLOAD_DIR=/app/data/uploads
      - LOG_DIR=/var/log/zhkh-bot
    env_file: [.env]
    networks:
      - zhkh-bot-network
    depends_on:
      - web

  angie:
    image: docker.angie.software/angie:1.11.8-minimal
    container_name: zhkh-angie
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    volumes:
      - ./docker/angie.conf:/etc/angie/angie.conf:ro
      - ./logs/angie:/var/log/angie
    networks:
      - zhkh-bot-network
    depends_on:
      web:
        condition: service_healthy

networks:
  zhkh-bot-network:
    driver: bridge
