services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/storefront.db
      - UPLOAD_DIR=/app/data/uploads
    networks:
      - storefront-network

  angie:
    image: docker.angie.software/angie:1.10.2-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    volumes:
      - ./docker/angie.conf:/etc/angie/angie.conf:ro
    depends_on:
      - web
    networks:
      - storefront-network

networks:
  storefront-network:
    driver: bridge
