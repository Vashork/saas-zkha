services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: storefront-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/storefront.db
      - UPLOAD_DIR=/app/data/uploads
    networks:
      - storefront-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  angie:
    image: docker.angie.software/angie:1.10.2-alpine
    container_name: storefront-angie
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    volumes:
      - ./docker/angie.conf:/etc/angie/angie.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - storefront-network

networks:
  storefront-network:
    driver: bridge
